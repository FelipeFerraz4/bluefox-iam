services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: bluefox-iam-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iam-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: bluefox-iam-server
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${DB_NAME}
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HTTP_PORT: ${KC_HOSTNAME_PORT}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
    ports:
      - "${KC_HOSTNAME_PORT}:${KC_HOSTNAME_PORT}"
    depends_on:
      - keycloak-db
    networks:
      - iam-network
      - shared-net

networks:
  iam-network:
    driver: bridge
  shared-net:
    name: ${DOCKER_NETWORK}
    external: true

volumes:
  postgres_data:
